# Override needrestart's default post-apt behaviour: list services with
# stale library mappings, but never restart them automatically.
#
# Default behaviour cascades restarts (resolved, networkd, redis, sshd, ...)
# right after `apt install` of any package, which can be very disruptive on
# a multi-user research cluster — see `issues/storage/` and Roadmap notes.
# Visibility is preserved: tpu-health surfaces the count via `needrestart -b
# -r l`. Reboots are managed manually during quiet windows.
$nrconf{restart} = 'l';
