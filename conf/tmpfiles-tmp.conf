# Override /usr/lib/tmpfiles.d/tmp.conf.
#
# The upstream default is `D /tmp 1777 root root -`, which clears /tmp on
# boot but doesn't age-clean during runtime. TPU VMs don't reboot, so the
# default lets /tmp accumulate indefinitely (observed 1.7 GB of files going
# back months). Add an age so the daily systemd-tmpfiles-clean timer also
# removes entries older than 14 days.
#
# Systemd-tmpfiles evaluates age against max(atime, mtime, ctime), so files
# that are still in active use are protected.

D /tmp 1777 root root 14d
