# Google Compute Engine default console logging — DISABLED.
#
# Upstream this file routes daemon,kern messages to /dev/console for boot-
# time crash diagnostics. On this cluster rsyslog runs as user `syslog`,
# which is not in the `tty` group, so it can't open /dev/console (mode
# 0620, root:tty). Every matching message trips the omfile action, which
# floods journald with "action-8-builtin:omfile suspended" entries at
# thousands of lines per hour per VM. We don't use the console on these
# headless VMs, so disabling is safe (daemon/kern still reach the usual
# destinations via other rsyslog rules).
#
#daemon,kern.* /dev/console
